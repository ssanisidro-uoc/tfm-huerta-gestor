version: '3.8'

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-huerta}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-huerta}
      POSTGRES_DB: ${DB_NAME:-huerta}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-huerta}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-huerta}:${DB_PASSWORD:-huerta}@db:5432/${DB_NAME:-huerta}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./App-Back/.env:/app/backend/.env:ro

volumes:
  postgres_data: