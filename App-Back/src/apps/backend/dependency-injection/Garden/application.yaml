services:
  Backend.Garden.domain.GardenRepository:
    class: ../../../Contexts/Garden/infrastructure/persistence/PostgresGardenRepository
    arguments: ['@Backend.Shared.DatabasePool']

  Backend.Garden.application.GardenCreator:
    class: ../../../Contexts/Garden/application/Create/GardenCreator
    arguments: ['@Backend.Garden.domain.GardenRepository']

  Backend.Garden.application.GardenUpdater:
    class: ../../../Contexts/Garden/application/Update/GardenUpdater
    arguments: ['@Backend.Garden.domain.GardenRepository']

  Backend.Garden.application.GardenDeleter:
    class: ../../../Contexts/Garden/application/Delete/GardenDeleter
    arguments: ['@Backend.Garden.domain.GardenRepository']

  Backend.Garden.application.AllGardensFinder:
    class: ../../../Contexts/Garden/application/FindAllGardens/AllGardensFinder
    arguments: ['@Backend.Garden.domain.GardenRepository']

  Backend.Garden.application.GardenByIdFinder:
    class: ../../../Contexts/Garden/application/FindGardenById/GardenByIdFinder
    arguments: ['@Backend.Garden.domain.GardenRepository']

  Backend.Garden.application.CreateGardenCommandHandler:
    class: ../../../Contexts/Garden/application/Create/CreateGardenCommandHandler
    arguments: ['@Backend.Garden.application.GardenCreator']
    tags:
      - { name: 'commandHandler' }

  Backend.Garden.application.UpdateGardenCommandHandler:
    class: ../../../Contexts/Garden/application/Update/UpdateGardenCommandHandler
    arguments: ['@Backend.Garden.application.GardenUpdater']
    tags:
      - { name: 'commandHandler' }

  Backend.Garden.application.DeleteGardenCommandHandler:
    class: ../../../Contexts/Garden/application/Delete/DeleteGardenCommandHandler
    arguments: ['@Backend.Garden.application.GardenDeleter']
    tags:
      - { name: 'commandHandler' }

  Backend.Garden.application.FindAllGardensQueryHandler:
    class: ../../../Contexts/Garden/application/FindAllGardens/FindAllGardensQueryHandler
    arguments: ['@Backend.Garden.application.AllGardensFinder']
    tags:
      - { name: 'queryHandler' }

  Backend.Garden.application.FindGardenByIdQueryHandler:
    class: ../../../Contexts/Garden/application/FindGardenById/FindGardenByIdQueryHandler
    arguments: ['@Backend.Garden.application.GardenByIdFinder']
    tags:
      - { name: 'queryHandler' }

  Backend.Garden.controllers.CreateGardenController:
    class: ../../controllers/garden/CreateGardenController
    arguments: ['@Backend.Shared.domain.CommandBus']

  Backend.Garden.controllers.FindGardensController:
    class: ../../controllers/garden/FindGardensController
    arguments: ['@Backend.Shared.domain.QueryBus']

  Backend.Garden.controllers.FindGardenByIdController:
    class: ../../controllers/garden/FindGardenByIdController
    arguments: ['@Backend.Shared.domain.QueryBus']

  Backend.Garden.controllers.UpdateGardenController:
    class: ../../controllers/garden/UpdateGardenController
    arguments: ['@Backend.Shared.domain.CommandBus']

  Backend.Garden.controllers.DeleteGardenController:
    class: ../../controllers/garden/DeleteGardenController
    arguments: ['@Backend.Shared.domain.CommandBus']

  Backend.Garden.domain.UserGardenRepository:
    class: ../../../Contexts/Garden/infrastructure/persistence/UserGardenRepository
    arguments: ['@Backend.Shared.DatabasePool']

  Backend.Garden.application.CollaboratorInviter:
    class: ../../../Contexts/Garden/application/InviteCollaborator/CollaboratorInviter
    arguments: ['@Backend.Garden.domain.UserGardenRepository', '@Backend.User.domain.UserRepository']

  Backend.Garden.controllers.InviteCollaboratorController:
    class: ../../controllers/garden/InviteCollaboratorController

  Backend.Garden.controllers.AcceptInvitationController:
    class: ../../controllers/garden/AcceptInvitationController

  Backend.Garden.application.ListSharedGardensQueryHandler:
    class: ../../../Contexts/Garden/application/ListSharedGardens/ListSharedGardensQueryHandler
    arguments: ['@Backend.Garden.domain.UserGardenRepository', '@Backend.Garden.domain.GardenRepository']
    tags:
      - { name: 'queryHandler' }

  Backend.Garden.controllers.ListSharedGardensController:
    class: ../../controllers/garden/ListSharedGardensController
    arguments: ['@Backend.Shared.domain.QueryBus']
