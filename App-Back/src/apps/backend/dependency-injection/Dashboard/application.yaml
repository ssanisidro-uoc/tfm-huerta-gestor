services:
  Backend.Dashboard.application.DashboardStatsFinder:
    class: ../../../../Contexts/Dashboard/application/Stats/DashboardStatsFinder
    arguments:
      [
        '@Backend.Garden.domain.UserGardenRepository',
        '@Backend.Planting.domain.PlantingRepository',
        '@Backend.Plot.domain.PlotRepository'
      ]

  Backend.Dashboard.application.GetDashboardStatsQueryHandler:
    class: ../../../../Contexts/Dashboard/application/Stats/GetDashboardStatsQueryHandler
    arguments: ['@Backend.Dashboard.application.DashboardStatsFinder']
    tags:
      - { name: 'queryHandler' }

