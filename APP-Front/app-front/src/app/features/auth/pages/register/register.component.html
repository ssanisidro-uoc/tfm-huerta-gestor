<div class="register-container">
  <div class="register-card" role="region" aria-labelledby="register-title">
    <h1 id="register-title">{{ 'auth.register' | t }}</h1>
    
    @if (error()) {
      <div class="error-message" role="alert" aria-live="assertive">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" aria-label="Formulario de registro">
      <div class="form-group">
        <label for="name">{{ 'auth.name' | t }}</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          required
          aria-required="true"
          [disabled]="loading()"
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">{{ 'auth.email' | t }}</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          aria-required="true"
          [disabled]="loading()"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'auth.password' | t }}</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          aria-required="true"
          [disabled]="loading()"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">{{ 'auth.confirmPassword' | t }}</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          aria-required="true"
          [disabled]="loading()"
          autocomplete="new-password"
        />
      </div>

      <button 
        type="submit" 
        [disabled]="loading()"
        [attr.aria-busy]="loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          <span>{{ 'app.loading' | t }}</span>
        } @else {
          {{ 'auth.register' | t }}
        }
      </button>
    </form>

    <p class="login-link">
      {{ 'auth.hasAccount' | t }} <a routerLink="/auth/login" aria-label="Iniciar sesión">{{ 'auth.login' | t }}</a>
    </p>
  </div>
</div>
