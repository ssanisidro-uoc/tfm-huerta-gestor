<div class="register-container">
  <div class="register-card" role="region" aria-labelledby="register-title">
    <h1 id="register-title">Crear Cuenta</h1>
    
    @if (error()) {
      <div class="error-message" role="alert" aria-live="assertive">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" aria-label="Formulario de registro">
      <div class="form-group">
        <label for="name">Nombre</label>
        <input
          type="text"
          id="name"
          [(ngModel)]="name"
          name="name"
          required
          aria-required="true"
          [disabled]="loading()"
          autocomplete="name"
        />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          aria-required="true"
          [disabled]="loading()"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          minlength="6"
          aria-required="true"
          [disabled]="loading()"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input
          type="password"
          id="confirmPassword"
          [(ngModel)]="confirmPassword"
          name="confirmPassword"
          required
          aria-required="true"
          [disabled]="loading()"
          autocomplete="new-password"
        />
      </div>

      <button 
        type="submit" 
        [disabled]="loading()"
        [attr.aria-busy]="loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          <span>Cargando...</span>
        } @else {
          Crear Cuenta
        }
      </button>
    </form>

    <p class="login-link">
      ¿Ya tienes cuenta? <a routerLink="/auth/login" aria-label="Iniciar sesión">Inicia Sesión</a>
    </p>
  </div>
</div>
