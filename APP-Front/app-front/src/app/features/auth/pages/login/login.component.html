<div class="login-container">
  <div class="login-card" role="region" aria-labelledby="login-title">
    <h1 id="login-title">{{ 'auth.login' | t }}</h1>
    
    @if (error()) {
      <div class="error-message" role="alert" aria-live="assertive">{{ error() }}</div>
    }

    <form (ngSubmit)="onSubmit()" aria-label="Formulario de inicio de sesión">
      <div class="form-group">
        <label for="email">{{ 'auth.email' | t }}</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="email"
          name="email"
          required
          email
          aria-required="true"
          [disabled]="loading()"
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label for="password">{{ 'auth.password' | t }}</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="password"
          name="password"
          required
          aria-required="true"
          [disabled]="loading()"
          autocomplete="current-password"
        />
      </div>

      <button 
        type="submit" 
        [disabled]="loading()"
        [attr.aria-busy]="loading()"
      >
        @if (loading()) {
          <span class="spinner" aria-hidden="true"></span>
          <span>{{ 'app.loading' | t }}</span>
        } @else {
          {{ 'auth.login' | t }}
        }
      </button>
    </form>

    <p class="register-link">
      {{ 'auth.noAccount' | t }} <a routerLink="/auth/register" aria-label="Registrarse">{{ 'auth.register' | t }}</a>
    </p>
  </div>
</div>
